<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rig Overview</title>

<!-- NAV BAR SCRIPT -->
<script src="../Components/Nav-Bar.js"></script>

<style>
/* ---------------------------------------------------------
   GLOBAL THEME (Dark industrial UI)
--------------------------------------------------------- */
:root{
  --bg:#000000;
  --tile:#1f1f1f;
  --tile-hover:#2a2a2a;
  --text:#ffffff;
  --muted:#bfbfbf;

  --radius:14px;

  --green: rgba(0, 255, 0, 0.6);
  --red: rgba(255, 60, 60, 0.7);
  --yellow: rgb(255, 255, 0);
  --blue: rgba(0, 200, 255, 0.7);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family: Inter, system-ui, sans-serif;
}

/* ---------------------------------------------------------
   PAGE CONTAINER
--------------------------------------------------------- */
.page-wrap{
  padding:60px 40px 40px;   /* reduced from 110px for better tablet/mobile fit */
  max-width:1600px;
  margin:auto;
}

/* ---------------------------------------------------------
   GRID LAYOUT
--------------------------------------------------------- */
.rig-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:30px;
  margin-top:20px;
}

/* ---------------------------------------------------------
   RIG CARD BASE STYLE
--------------------------------------------------------- */
.rig-card{
  background:var(--tile);
  padding:24px;
  border-radius:var(--radius);
  border:2px solid #333;
  transition: all .2s ease;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
  cursor:pointer;
}

.rig-card:hover{
  background:var(--tile-hover);
  transform:translateY(-3px);
}

/* Title */
.rig-card h2{
  margin:0 0 14px;
  font-size:1.6rem;
}

/* Info layout */
.info-grid{
  display:grid;
  grid-template-columns: 120px 1fr;
  row-gap:8px;
}

.info-label{
  color:var(--muted);
}

.info-value{
  font-weight:600;
}

/* ---------------------------------------------------------
   STATUS COLOURS
--------------------------------------------------------- */
.rig-card.free{
  border-color: var(--green);
  box-shadow: 0 0 10px var(--green);
}

.rig-card.free:hover{
  box-shadow: 0 0 18px rgba(0, 255, 0, 0.9);
  background: rgba(0, 80, 0, 0.45);
}

.rig-card.busy{
  border-color: var(--red);
  box-shadow: 0 0 10px var(--red);
}

.rig-card.offline{
  border-color: var(--yellow);
  box-shadow: 0 0 16px rgba(255,255,0,0.9);
}

.rig-card.online{
  border-color: var(--blue);
  box-shadow: 0 0 16px rgba(65,211,110,.65);
}

.rig-card.offline:hover{
  background:#3a3a00;
}

/* ---------------------------------------------------------
   RESPONSIVE DESIGN FOR TABLETS AND MOBILE
--------------------------------------------------------- */
@media (max-width: 1024px) {
  /* Tablet adjustments */
  .page-wrap{
    padding: 80px 30px 30px;  /* Reduced top padding for tablets */
  }
  
  .rig-grid{
    gap: 20px;
  }
  
  .rig-card{
    padding: 20px;
  }
}

@media (max-width: 768px) {
  /* Mobile/Small tablet adjustments */
  .page-wrap{
    padding: 70px 20px 20px;  /* Even less top padding */
  }
  
  .rig-grid{
    grid-template-columns: 1fr;  /* Single column on small screens */
    gap: 15px;
  }
  
  .rig-card h2{
    font-size: 1.4rem;
  }
}

</style>
</head>

<body>

<script>
/* ---------------------------------------------------------
   INITIALISE NAV BAR
--------------------------------------------------------- */
document.addEventListener("DOMContentLoaded", () => {
  initNavigationBar({
    title: "Rig Overview",
    pages: [
      { label: "Rig Overview", href: "../Rig-Overview/Rig-Overview.html" },
      { label: "Getting Started", href: "../Getting-Started/Getting-Started.html" },
      { label: "PDF Chart Generation", href: "../PDF-Chart-Generation/PDF-Chart-Generation.html" },
      { label: "Historical Trend", href: "../Historical-Trend/Historical-Trend.html" }
    ]
  });
});
</script>

<!-- ---------------------------------------------------------
     PAGE CONTENT
--------------------------------------------------------- -->
<div class="page-wrap">

  <h1>Rig Overview</h1>

  <div class="rig-grid">

    <!-- HYDRO 1 -->
    <div class="rig-card" data-id="hydrorig1" data-url="http://10.1.6.101:8080/webvisu.htm">
      <h2>Hydrostatic Rig 1</h2>
      <div class="info-grid">
        <div class="info-label">User</div>    <div id="hydrorig1-user">—</div>
        <div class="info-label">OTS No</div>  <div id="hydrorig1-ref">—</div>
        <div class="info-label">Test</div>    <div id="hydrorig1-test">—</div>
        <div class="info-label">Prompt</div>  <div id="hydrorig1-prompt">—</div>
      </div>
    </div>

    <!-- HYDRO 2 -->
    <div class="rig-card" data-id="hydrorig2" data-url="http://10.1.6.102:8080/webvisu.htm">
      <h2>Hydrostatic Rig 2</h2>
      <div class="info-grid">
        <div class="info-label">User</div>    <div id="hydrorig2-user">—</div>
        <div class="info-label">OTS No</div>  <div id="hydrorig2-ref">—</div>
        <div class="info-label">Test</div>    <div id="hydrorig2-test">—</div>
        <div class="info-label">Prompt</div>  <div id="hydrorig2-prompt">—</div>
      </div>
    </div>

    <!-- GAS 1 -->
    <div class="rig-card" data-id="gasrig1" data-url="http://10.1.6.103:8080/webvisu.htm">
      <h2>Gas Rig 1</h2>
      <div class="info-grid">
        <div class="info-label">User</div>    <div id="gasrig1-user">—</div>
        <div class="info-label">OTS No</div>  <div id="gasrig1-ref">—</div>
        <div class="info-label">Test</div>    <div id="gasrig1-test">—</div>
        <div class="info-label">Prompt</div>  <div id="gasrig1-prompt">—</div>
      </div>
    </div>

    <!-- GAS 2 -->
    <div class="rig-card" data-id="gasrig2" data-url="http://10.1.6.104:8080/webvisu.htm">
      <h2>Gas Rig 2</h2>
      <div class="info-grid">
        <div class="info-label">User</div>    <div id="gasrig2-user">—</div>
        <div class="info-label">OTS No</div>  <div id="gasrig2-ref">—</div>
        <div class="info-label">Test</div>    <div id="gasrig2-test">—</div>
        <div class="info-label">Prompt</div>  <div id="gasrig2-prompt">—</div>
      </div>
    </div>

  </div>
</div>

<!-- ---------------------------------------------------------
     LIVE STATUS SCRIPT
--------------------------------------------------------- -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".rig-card").forEach(card => {
    card.addEventListener("click", () => {
      const url = card.getAttribute("data-url");
      if (url) window.location.href = url;
    });
  });

  const rigs = [
    { id:"hydrorig1", host:"10.1.6.101:8080" },
    { id:"hydrorig2", host:"10.1.6.102:8080" },
    { id:"gasrig1",   host:"10.1.6.103:8080" },
    { id:"gasrig2",   host:"10.1.6.104:8080" },
  ];

  function normalise(json){
    if (!json) return null;
    if (json.user) return json;
    const keys = Object.keys(json);
    return json[keys[0]] || null;
  }

  async function updateRig(r){
    const card = document.querySelector(`.rig-card[data-id="${r.id}"]`);
    try{
      const res = await fetch(`/api/rig-json?host=${encodeURIComponent(r.host)}&ts=${Date.now()}`);
      if(!res.ok) throw new Error("No data");
      const raw = await res.json();
      const data = normalise(raw);
      card.classList.add("online");
      card.classList.remove("offline");
      if(!data) {
        card.classList.remove("busy");
        card.classList.add("free");
        return;
      }

      document.getElementById(`${r.id}-user`).textContent   = data.user || "—";
      document.getElementById(`${r.id}-ref`).textContent    = data.rdReference || "—";
      document.getElementById(`${r.id}-test`).textContent   = data.testTitle || "—";
      document.getElementById(`${r.id}-prompt`).textContent = data.currentPrompt || "—";

      const busy = (data.user || "").trim() !== "";

      card.classList.toggle("free", !busy);
      card.classList.toggle("busy", busy);
      card.classList.remove("offline");
      card.classList.toggle("online", true);
    }
    catch(err){
      console.warn(`Rig offline: ${r.id}`);
      if (r.id === "hydrorig1") {
        card.classList.remove("busy", "online", "offline");
        card.classList.add("free");
      } else {
        card.classList.remove("busy", "free", "online");
        card.classList.add("offline");
      }
    }
  }

  function refreshAll(){
    rigs.forEach(updateRig);
  }

  refreshAll();
  setInterval(refreshAll, 5000);

});
</script>

</body>
</html>
