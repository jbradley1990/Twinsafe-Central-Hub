<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Getting Started</title>
  <script src="../assets/tailwind.js"></script>
  <link rel="stylesheet" href="../styles/main.css" />
  <script src="https://script.supademo.com/supademo.js"></script>
  <style>
    .nav-sub-link {
      color: var(--color-text-muted);
      font-weight: 500;
      transition: all var(--transition-normal);
      white-space: nowrap;
      padding: 0.75rem 1rem;
      border-bottom: 2px solid transparent;
    }
    .nav-sub-link:hover { color: var(--color-text-primary); }
    .nav-sub-link.active {
      color: var(--color-text-primary);
      border-bottom-color: var(--color-accent);
      background: rgba(255,255,255,0.05);
    }
    .guide-section { display: none; }
    .guide-section.active { display: block; }

    supademo-embed {
      width: 100%;
      min-height: 600px;
      display: block;
    }

    /* Hide scrollbar but keep functionality */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="body-styles flex flex-col h-screen">
  <nav class="flex items-center justify-between px-6 py-3 bg-neutral-900 border-b border-neutral-800 shadow-md">
    <div class="flex items-center gap-6">
      <img src="../assets/Green Oliver V.png" alt="Logo" class="h-8 cursor-pointer" onclick="location.href='rig-overview.html'">
      <div class="flex gap-4">
        <a href="rig-overview.html" class="text-gray-400 font-medium hover:text-white transition-colors">Rig Overview</a>
        <a href="getting-started.html" class="text-white font-medium hover:text-gray-300">Getting Started</a>
        <a href="pdf-chart-generation.html" class="text-gray-400 font-medium hover:text-white transition-colors">PDF Generation</a>
        <a href="historical-trend.html" class="text-gray-400 font-medium hover:text-white transition-colors">Historical Trend</a>
      </div>
    </div>
    <div class="flex flex-col items-end">
      <div id="nav-time" class="text-lg font-bold leading-none">00:00:00</div>
      <div id="nav-date" class="text-xs text-gray-400">01/01/2026</div>
    </div>
  </nav>

  <!-- Sub Navigation -->
  <div class="bg-neutral-800 border-b border-neutral-700 px-6 flex gap-2 overflow-x-auto no-scrollbar">
    <a href="#user-authentication" class="nav-sub-link">User Authentication</a>
    <a href="#test-details" class="nav-sub-link">Test Details</a>
    <a href="#unique-numbers" class="nav-sub-link">Unique Numbers</a>
    <a href="#transducer-setup" class="nav-sub-link">Transducer Setup</a>
    <a href="#testing" class="nav-sub-link">Testing</a>
    <a href="#trend" class="nav-sub-link">Trend</a>
    <a href="#previous-pdf" class="nav-sub-link">Previous PDF</a>
  </div>

  <main class="flex-grow p-6 overflow-hidden">
    <div class="panel h-full overflow-y-auto p-8 bg-neutral-900">
        <article class="max-w-5xl mx-auto">
          <section id="user-authentication" class="guide-section active">
            <h1 class="text-4xl font-bold mb-8">User Authentication</h1>
            <div class="rounded-xl overflow-hidden border border-neutral-700 shadow-2xl">
              <supademo-embed demo-id="cmlrxgxew156a1189u64a5k4t"></supademo-embed>
            </div>
          </section>

          <section id="test-details" class="guide-section">
            <h1 class="text-4xl font-bold mb-8">Test Details</h1>
            <div class="rounded-xl overflow-hidden border border-neutral-700 shadow-2xl">
              <supademo-embed demo-id="cmlqf2ius2jwjegrdaa6z6l6u"></supademo-embed>
            </div>
          </section>

          <section id="unique-numbers" class="guide-section">
            <h1 class="text-4xl font-bold mb-8">Unique Numbers</h1>
            <div class="rounded-xl overflow-hidden border border-neutral-700 shadow-2xl">
              <supademo-embed demo-id="cmlrxvi7o16pa1189rv41qwke"></supademo-embed>
            </div>
          </section>

          <section id="transducer-setup" class="guide-section">
            <h1 class="text-4xl font-bold mb-8">Transducer Setup</h1>
            <div class="rounded-xl overflow-hidden border border-neutral-700 shadow-2xl">
              <supademo-embed demo-id="cmls332sn1o3p1189d7urt3hl"></supademo-embed>
            </div>
          </section>

          <section id="testing" class="guide-section">
            <h1 class="text-4xl font-bold mb-8">Testing</h1>
            <div class="rounded-xl overflow-hidden border border-neutral-700 shadow-2xl">
              <supademo-embed demo-id="cmls3qczr1pqq118906wen0i9"></supademo-embed>
            </div>
          </section>

          <section id="trend" class="guide-section">
            <h1 class="text-4xl font-bold mb-8">Trend</h1>
            <div class="rounded-xl overflow-hidden border border-neutral-700 shadow-2xl">
              <supademo-embed demo-id="cmls5x3i61v791189l9m8vk6w"></supademo-embed>
            </div>
          </section>

          <section id="previous-pdf" class="guide-section">
            <h1 class="text-4xl font-bold mb-8">Previous PDF</h1>
            <div class="rounded-xl overflow-hidden border border-neutral-700 shadow-2xl">
              <supademo-embed demo-id="cmls69ql31vy91189zdgi41rg"></supademo-embed>
            </div>
          </section>
        </article>
    </div>
  </main>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('nav-time').textContent = now.toLocaleTimeString('en-GB', { hour12: false });
      document.getElementById('nav-date').textContent = now.toLocaleDateString('en-GB');
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Router
    function route() {
      const id = (location.hash || "#user-authentication").slice(1);
      document.querySelectorAll(".guide-section").forEach(s => s.classList.toggle("active", s.id === id));
      document.querySelectorAll(".nav-sub-link").forEach(a => {
        const href = a.getAttribute("href");
        a.classList.toggle("active", href === "#" + id);
      });

      // Auto-scroll the active section into view if needed (though routing usually handles this)
      // Actually since we only show one section at a time, scroll to top of the panel
      const panel = document.querySelector('.panel');
      if (panel) panel.scrollTop = 0;
    }
    window.addEventListener("hashchange", route);
    document.addEventListener("DOMContentLoaded", route);
  </script>
</body>
</html>
