<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Historical Trend</title>

    <!-- NAV BAR SCRIPT -->
    <script src="../Components/Nav-Bar.js"></script>

    <!-- PLOTLY JS -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --panel-bg: rgba(20, 20, 20, 0.9);
            --border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --accent: #f59e0b;
            font-family: Inter, system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Layout Structure */
        #mainLayout {
            display: flex;
            flex-direction: row;
            width: 100vw;
            height: calc(100vh - 50px); /* Adjust for navbar height */
            padding: 20px;
            box-sizing: border-box;
            gap: 20px;
        }

        #chartContainer {
            flex: 1;
            min-width: 0;
            min-height: 0;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background: #000;
        }

        #uiSidebar {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-top: 0;
            box-sizing: border-box;
            height: 100%;
            z-index: 20;
        }

        /* Common Panel Styles */
        .overlay-panel {
            flex: 1;
            min-height: 0;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }

        .panel-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
            flex-shrink: 0;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding-right: 4px;
        }

        /* Scrollbar styling */
        .scroll-content::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* Pressure Box (Pinned Hover) */
        .ph-time {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 12px;
            color: #fff;
        }
        .ph-row {
            display: flex;
            flex-direction: column;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        .ph-row:hover { background: rgba(255, 255, 255, 0.05); }
        .ph-row.is-hidden { opacity: 0.4; }
        .ph-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ph-value {
            font-size: 1.25rem;
            font-weight: 500;
            color: #e2e8f0;
            margin-top: 4px;
        }

        /* Cursor Measurements */
        .measurement-meta {
            display: grid;
            grid-template-columns: 1fr;
            gap: 4px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: #cbd5e1;
        }
        .measurement-meta span { font-weight: 600; color: #fff; }
        .measurement-row {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
        }
        .measurement-row-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .measurement-row-title span { width: 12px; height: 4px; border-radius: 2px; }
        .measurement-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.9rem;
        }
        .measurement-stat-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; }

        /* Controls */
        #controlOverlay {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: opacity 0.2s, background 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .btn-grey { background: #272727; }
        .btn-grey:hover { background: #333; }
        .btn-accent { background: var(--accent); }
        .btn-accent:hover { opacity: 0.9; }
        .btn-blue { background: #475569; }

        /* Helpers */
        .hidden { display: none !important; }
        .absolute { position: absolute; }
        .inset-0 { top: 0; left: 0; right: 0; bottom: 0; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .text-center { text-align: center; }

        /* Chart Elements Hiding */
        .hoverlayer .hovertext,
        .hoverlayer .axistext,
        .hoverlayer .hovercursor,
        .hoverlayer path,
        .hoverlayer rect {
            display: none !important;
        }

        /* Cursor Interaction Area */
        .measurement-handle-layer {
          position: absolute;
          inset: 0;
          pointer-events: none;
          z-index: 18;
        }
        .measurement-hit-area {
          position: absolute;
          width: 10px;
          background: rgba(255, 255, 255, 0); /* Invisible but captures events */
          pointer-events: auto;
          cursor: ew-resize;
        }
    </style>
</head>

<body>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        initNavigationBar();
    });
</script>

<main id="mainLayout">
    <div id="chartContainer">
        <div id="chart" class="inset-0 absolute"></div>
        <div id="messageOverlay" class="absolute inset-0 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.9);">
            <div class="text-center text-white">
                <h3 class="font-medium" style="font-size: 1.5rem;">No data loaded</h3>
                <p style="opacity: 0.7; margin-top: 8px;">Please select a CSV file to view trends.</p>
            </div>
        </div>
    </div>

    <div id="uiSidebar">
        <!-- Pressure Box -->
        <div id="pinnedHover" class="overlay-panel hidden">
            <div class="ph-time" id="phTime"></div>
            <div class="scroll-content" id="phRows"></div>
        </div>

        <!-- Cursor Measurements -->
        <div id="measurementOverlay" class="overlay-panel hidden">
            <div class="panel-header">Cursor Measurements</div>
            <div id="measurementMeta" class="measurement-meta"></div>
            <div id="measurementRows" class="scroll-content"></div>
        </div>

        <!-- Controls -->
        <div id="controlOverlay">
            <label class="btn btn-grey" style="display: block;">
                <span id="fileInputText">Select CSV</span>
                <input type="file" id="fileInput" accept=".csv" class="hidden">
            </label>
            <button id="measurementToggleBtn" class="btn btn-blue">Cursors Off</button>
        </div>
    </div>
</main>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileInputText = document.getElementById('fileInputText');
    const chartDiv = document.getElementById('chart');
    const messageOverlay = document.getElementById('messageOverlay');
    const measurementToggleBtn = document.getElementById('measurementToggleBtn');
    const measurementOverlay = document.getElementById('measurementOverlay');
    const pinnedHover = document.getElementById('pinnedHover');
    const phTime = document.getElementById('phTime');
    const phRows = document.getElementById('phRows');
    const measurementMeta = document.getElementById('measurementMeta');
    const measurementRows = document.getElementById('measurementRows');

    const PRESSURE_COLORS = ['#FF0000', '#00B050', '#FF8C00', '#FFD700', '#8A2BE2', '#00CED1', '#FF00FF', '#ADFF2F'];
    const AMBIENT_TEMP_COLOR = '#0000FF';

    let dataFile = null;
    let channelInfo = [];
    let channelNames = [];
    let hoverTime = null;

    let measurementModeActive = false;
    let measurementCursors = null;
    let measurementCursorAnchors = null;
    let measurementEditRevision = 0;
    let measurementHandleLayer = null;
    let measurementHandleElements = [];
    let measurementHandleDrag = null;

    fileInput.addEventListener('change', handleFileSelection);
    measurementToggleBtn.addEventListener('click', () => {
        if (measurementModeActive) disableMeasurementMode();
        else enableMeasurementMode();
    });
    pinnedHover.addEventListener('click', onPinnedPanelClick);

    function handleFileSelection(event) {
        const files = Array.from(event.target.files || []);
        if (files.length === 0) return;
        fileInputText.textContent = files[0].name;
        dataFile = files[0];
        handlePlotRequest();
    }

    async function handlePlotRequest() {
        if (!dataFile) return;
        if (measurementModeActive) disableMeasurementMode();
        messageOverlay.innerHTML = '<div class="text-center text-white"><h3>Loading...</h3></div>';
        messageOverlay.classList.remove('hidden');
        try {
            const reader = new FileReader();
            reader.onload = async () => {
                await plotData(reader.result);
                messageOverlay.classList.add('hidden');
            };
            reader.readAsText(dataFile);
        } catch (error) {
            messageOverlay.innerHTML = `<div class="text-center text-red-400"><h3>Error</h3><p>${error.message}</p></div>`;
        }
    }

    async function plotData(csvText) {
        const lines = csvText.trim().split('\n');
        if (lines.length < 2) return;
        const header = lines[0].split(',');

        channelInfo = [];
        for (let i = 1; i <= 9; i++) {
            const name = (header[i] || '').trim();
            const isTemp = (i === 9);
            channelInfo.push({
                name: name || (isTemp ? 'Ambient Temperature' : `Pressure ${i}`),
                visible: name !== '',
                isTemp: isTemp,
                colIndex: i
            });
        }

        const traces = channelInfo.map((ci, idx) => {
            const isPressure = !ci.isTemp;
            return {
                x: [], y: [],
                mode: 'lines',
                name: ci.name,
                line: {
                    width: 1.5,
                    color: ci.isTemp ? AMBIENT_TEMP_COLOR : PRESSURE_COLORS[idx],
                    dash: ci.isTemp ? 'dot' : 'solid'
                },
                hoverinfo: 'none',
                yaxis: isPressure ? 'y' : 'y2',
                visible: ci.visible ? true : 'legendonly'
            };
        });

        lines.slice(1).forEach(line => {
            const cols = line.split(',');
            const ts = new Date(cols[0].trim());
            if (isNaN(ts.getTime())) return;
            channelInfo.forEach((ci, idx) => {
                const val = parseFloat(cols[ci.colIndex]);
                if (!isNaN(val)) {
                    traces[idx].x.push(ts);
                    traces[idx].y.push(val);
                }
            });
        });

        const layout = {
            margin: { l: 0, r: 0, b: 0, t: 0 },
            plot_bgcolor: '#111',
            paper_bgcolor: '#000',
            showlegend: false,
            hovermode: 'x unified',
            hoverlabel: { bgcolor: 'rgba(0,0,0,0)', bordercolor: 'rgba(0,0,0,0)' },
            xaxis: {
                automargin: true,
                gridcolor: '#333',
                tickfont: { color: '#fff' },
                showspikes: true,
                spikecolor: '#fff',
                spikedash: 'dash',
                spikethickness: 1,
                spikemode: 'across',
                spikesnap: 'cursor'
            },
            yaxis: {
                automargin: true,
                title: { text: 'Pressure (psi)', font: { color: '#fff' } },
                gridcolor: '#333',
                tickfont: { color: '#fff' }
            },
            yaxis2: {
                overlaying: 'y',
                visible: false,
                range: [-60, 260]
            }
        };

        await Plotly.react(chartDiv, traces, layout, { responsive: true, displayModeBar: false });
        channelNames = channelInfo.map(ci => ci.name);
        attachPlotEvents();
        renderPinnedPanel();
    }

    function attachPlotEvents() {
        chartDiv.on('plotly_hover', (e) => {
            hoverTime = new Date(e.points[0].x);
            renderPinnedPanel(hoverTime);
        });
        chartDiv.on('plotly_unhover', () => {
            hoverTime = null;
            renderPinnedPanel();
        });
        chartDiv.on('plotly_relayout', onPlotRelayout);
    }

    function renderPinnedPanel(time = null) {
        const target = time || getLatestTime();
        if (!target) return;

        phTime.textContent = target.toLocaleString(undefined, { hour12: false });

        const items = chartDiv.data.map((trace, i) => ({
            trace,
            index: i,
            shown: trace.visible !== 'legendonly'
        }));

        // Sort: active first, then by original index
        items.sort((a, b) => {
            if (a.shown !== b.shown) return a.shown ? -1 : 1;
            return a.index - b.index;
        });

        const rows = items.map(({ trace, index, shown }) => {
            const val = sampleTraceValueAt(index, target);
            const unit = channelInfo[index].isTemp ? '°C' : 'psi';
            return `
                <div class="ph-row ${shown ? '' : 'is-hidden'}" data-index="${index}">
                    <div class="ph-label">
                        <span style="width:24px; border-top:3px ${trace.line.dash === 'dot' ? 'dotted' : 'solid'} ${trace.line.color};"></span>
                        ${escapeHTML(channelNames[index])}
                    </div>
                    <div class="ph-value">${val !== null ? val.toFixed(1) : '—'} <span style="font-size:0.8rem; opacity:0.6;">${unit}</span></div>
                </div>
            `;
        }).join('');
        phRows.innerHTML = rows;
        pinnedHover.classList.remove('hidden');
    }

    function sampleTraceValueAt(idx, time) {
        const trace = chartDiv.data[idx];
        if (!trace?.x.length) return null;
        const target = time.getTime();
        let lo = 0, hi = trace.x.length - 1;
        while (lo <= hi) {
            let mid = (lo + hi) >> 1;
            let t = new Date(trace.x[mid]).getTime();
            if (t === target) return trace.y[mid];
            if (t < target) lo = mid + 1; else hi = mid - 1;
        }
        return trace.y[lo] || trace.y[hi];
    }

    function onPinnedPanelClick(e) {
        const row = e.target.closest('.ph-row');
        if (!row) return;
        const idx = parseInt(row.dataset.index);
        const next = chartDiv.data[idx].visible === 'legendonly' ? true : 'legendonly';
        Plotly.restyle(chartDiv, { visible: next }, [idx]).then(() => {
            renderPinnedPanel(hoverTime);
            if (measurementModeActive) updateMeasurementOverlay();
        });
    }

    function getLatestTime() {
        if (!chartDiv.data?.length) return null;
        const lastTs = chartDiv.data[0].x[chartDiv.data[0].x.length - 1];
        return lastTs ? new Date(lastTs) : null;
    }

    function enableMeasurementMode() {
        measurementModeActive = true;
        measurementOverlay.classList.remove('hidden');
        measurementToggleBtn.textContent = 'Cursors On';
        measurementToggleBtn.classList.replace('btn-blue', 'btn-accent');

        const range = getCurrentXRange();
        if (range) {
            const span = range[1] - range[0];
            measurementCursors = [range[0] + span * 0.25, range[0] + span * 0.75];
        }

        ensureMeasurementHandleLayer();
        syncMeasurementShapes();
    }

    function disableMeasurementMode() {
        measurementModeActive = false;
        measurementOverlay.classList.add('hidden');
        measurementToggleBtn.textContent = 'Cursors Off';
        measurementToggleBtn.classList.replace('btn-accent', 'btn-blue');
        destroyMeasurementHandleLayer();
        Plotly.relayout(chartDiv, { shapes: [] });
    }

    function syncMeasurementShapes() {
        const shapes = measurementCursors.map((x, i) => ({
            type: 'line', xref: 'x', yref: 'paper',
            x0: new Date(x), x1: new Date(x), y0: 0, y1: 1,
            line: { color: '#fff', width: 2, dash: 'dash' },
            meta: 'measurement'
        }));
        Plotly.relayout(chartDiv, { shapes });
        updateMeasurementOverlay();
        updateMeasurementHitAreas();
    }

    function updateMeasurementOverlay() {
        const [a, b] = measurementCursors.sort((x, y) => x - y);
        measurementMeta.innerHTML = `
            <div><span>A:</span> ${new Date(a).toLocaleString()}</div>
            <div><span>B:</span> ${new Date(b).toLocaleString()}</div>
            <div><span>Δt:</span> ${((b - a) / 1000).toFixed(2)} s</div>
        `;

        measurementRows.innerHTML = chartDiv.data.map((trace, i) => {
            if (trace.visible === 'legendonly') return '';
            const stats = computeStats(trace, a, b);
            if (!stats) return '';
            const unit = channelInfo[i].isTemp ? '°C' : 'psi';
            return `
                <div class="measurement-row">
                    <div class="measurement-row-title">
                        <span style="background:${trace.line.color};"></span>
                        ${escapeHTML(channelNames[i])}
                    </div>
                    <div class="measurement-stats">
                        <div><div class="measurement-stat-label">Avg</div>${stats.avg.toFixed(1)}${unit}</div>
                        <div><div class="measurement-stat-label">Δ</div>${stats.delta.toFixed(1)}${unit}</div>
                        <div><div class="measurement-stat-label">Min</div>${stats.min.toFixed(1)}${unit}</div>
                        <div><div class="measurement-stat-label">Max</div>${stats.max.toFixed(1)}${unit}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function computeStats(trace, start, end) {
        let sum = 0, count = 0, min = Infinity, max = -Infinity, first = null, last = null;
        for (let i = 0; i < trace.x.length; i++) {
            const t = new Date(trace.x[i]).getTime();
            if (t < start) continue;
            if (t > end) break;
            const v = trace.y[i];
            if (first === null) first = v;
            last = v;
            sum += v; count++;
            if (v < min) min = v;
            if (v > max) max = v;
        }
        return count ? { avg: sum / count, delta: last - first, min, max } : null;
    }

    function ensureMeasurementHandleLayer() {
        if (measurementHandleLayer) return;
        measurementHandleLayer = document.createElement('div');
        measurementHandleLayer.className = 'measurement-handle-layer';
        measurementHandleElements = [0, 1].map(i => {
            const h = document.createElement('div');
            h.className = 'measurement-hit-area';
            h.addEventListener('pointerdown', e => {
                measurementHandleDrag = { i, pointerId: e.pointerId };
                h.setPointerCapture(e.pointerId);
            });
            h.addEventListener('pointermove', e => {
                if (measurementHandleDrag?.i !== i) return;
                const fullLayout = chartDiv._fullLayout;
                const xa = fullLayout.xaxis;
                const rect = chartDiv.getBoundingClientRect();
                const localX = e.clientX - rect.left - xa._offset;
                let value = xa.p2l(localX);

                // Clamp to current view range
                const r0 = new Date(xa.range[0]).getTime();
                const r1 = new Date(xa.range[1]).getTime();
                value = Math.max(Math.min(r0, r1), Math.min(Math.max(r0, r1), value));

                measurementCursors[i] = value;
                updateMeasurementOverlay();
                updateMeasurementHitAreas();

                // Update the chart shape in real-time
                const payload = {};
                const dateVal = new Date(value);
                payload[`shapes[${i}].x0`] = dateVal;
                payload[`shapes[${i}].x1`] = dateVal;
                Plotly.relayout(chartDiv, payload).catch(() => {});
            });
            h.addEventListener('pointerup', () => {
                measurementHandleDrag = null;
                syncMeasurementShapes();
            });
            measurementHandleLayer.appendChild(h);
            return h;
        });
        chartDiv.appendChild(measurementHandleLayer);
    }

    function destroyMeasurementHandleLayer() {
        measurementHandleLayer?.remove();
        measurementHandleLayer = null;
    }

    function updateMeasurementHitAreas() {
        if (!chartDiv._fullLayout || !measurementHandleElements.length) return;
        const fullLayout = chartDiv._fullLayout;
        const xa = fullLayout.xaxis;
        const ya = fullLayout.yaxis;

        measurementCursors.forEach((val, i) => {
            const x = xa._offset + xa.l2p(val);
            const el = measurementHandleElements[i];
            el.style.left = `${x - 5}px`;
            el.style.top = `${ya._offset}px`;
            el.style.height = `${ya._length}px`;
        });
    }

    function getCurrentXRange() {
        const r = chartDiv.layout?.xaxis?.range || chartDiv._fullLayout?.xaxis?.range;
        return r ? [new Date(r[0]).getTime(), new Date(r[1]).getTime()] : null;
    }

    function onPlotRelayout(e) {
        if (measurementModeActive) {
            updateMeasurementHitAreas();
        }
    }

    function escapeHTML(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function getTraceVisible(i) {
        return chartDiv.data[i].visible !== 'legendonly';
    }

</script>

</body>
</html>
